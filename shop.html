<!DOCTYPE html>

<head>
  <meta charset="UTF-8">

  <meta property="og:type" content="website">
  <meta property="og:site_name" content="Third String Shirts">
  <meta property="og:title" content="Shop | Third String Shirts">
  <meta property="og:description" content="Browse all Third String Shirts by theme.">
  <meta property="og:url" content="https://www.thirdstringshirts.com/shop.html">
  <meta property="og:image" content="https://www.thirdstringshirts.com/assets/logo.png">
  <meta property="og:image:alt" content="Third String Shirts logo">

  <meta name="twitter:description" content="Browse all Third String Shirts by theme.">

  <meta name="twitter:image:alt" content="Third String Shirts logo">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Alfa+Slab+One&family=Bungee&family=Graduate&family=Space+Grotesk:wght@400;500;700;800&display=swap" rel="stylesheet">

</head>
<body data-page="shop">
  <header class="site-header">
    <div class="container header-row">
      <a class="brand" href="./index.html" aria-label="Third String Shirts home">
        <img class="brand-mark" src="./assets/logo.png" alt="Third String Shirts logo">
        <span>
          <p class="brand-title">Third String Shirts</p>
          <p class="brand-tagline">Shirts for Third Stringers</p>
        </span>
      </a>
      <nav class="site-nav" aria-label="Primary">
        <a data-page="home" href="./index.html">Home</a>
        <a data-page="shop" href="./all-shirts.html">Shop</a>
        <a data-page="about" href="./about.html">About</a>
        <a data-page="faq" href="./faq.html">FAQ</a>
        <a data-page="contact" href="./contact.html">Contact</a>
      </nav>
    </div>
  </header>

  <main>
    <div class="container">
      <div class="panel spreadshop-shell">
        <div class="shop-shell-actions">
          <a id="shop-back-arrow" class="button alt shop-back-button" href="./all-shirts.html" aria-label="Go back">←</a>
          <button id="shop-share-button" class="button alt shop-share-button" type="button" aria-label="Share this shirt" hidden>Share</button>
        </div>
        <div id="sprd-shop">
          <a href="https://shop.spreadshirt.com/thirdstringshirts">thirdstringshirts</a>
        </div>
        <noscript>
          <p>JavaScript is required to load the embedded shop.</p>
        </noscript>
      </div>
    </div>
  </main>

  <footer class="site-footer">
    <div class="container footer-row">
      <p><strong>Third String Shirts</strong> | Bench energy, premium fabric.</p>
      <p>
        Follow on <a href="https://x.com/3rdstringshirts" target="_blank" rel="noopener noreferrer">X</a>
      </p>
    </div>
  </footer>

  <script src="./js/site.js"></script>
  <script>
    var spread_shop_config = {
      shopName: "thirdstringshirts",
      locale: "us_US",
      prefix: "//shop.spreadshirt.com",
      baseId: "sprd-shop",
      usePushState: false,
      updateMetadata: false
    };
  </script>
  <script src="https://shop.spreadshirt.com/shopfiles/shopclient/shopclient.nocache.js"></script>
  <script>
    (function wireBackArrow() {
      var backArrow = document.getElementById("shop-back-arrow");
      if (!backArrow) return;
      backArrow.addEventListener("click", function (event) {
        if (window.history.length > 1) {
          event.preventDefault();
          window.history.back();
        }
      });
    })();

    (function wireShareButton() {
      var shareButton = document.getElementById("shop-share-button");
      if (!shareButton) return;

      var defaultLabel = "Share";
      var resetTimer = null;

      function setTemporaryLabel(label) {
        shareButton.textContent = label;
        window.clearTimeout(resetTimer);
        resetTimer = window.setTimeout(function () {
          shareButton.textContent = defaultLabel;
        }, 1800);
      }

      function currentShareUrl() {
        return sharePageUrlFromHash(window.location.hash, window.location.origin);
      }

      function syncVisibility() {
        var shareUrl = currentShareUrl();
        shareButton.hidden = !shareUrl;
        if (!shareUrl) {
          shareButton.textContent = defaultLabel;
        }
      }

      shareButton.addEventListener("click", async function () {
        var shareUrl = currentShareUrl();
        if (!shareUrl) return;

        try {
          if (navigator.share) {
            await navigator.share({ url: shareUrl });
            return;
          }

          if (navigator.clipboard && navigator.clipboard.writeText) {
            await navigator.clipboard.writeText(shareUrl);
            setTemporaryLabel("Copied");
            return;
          }

          window.prompt("Copy this shirt link:", shareUrl);
        } catch (error) {
          if (error && error.name === "AbortError") return;
          window.prompt("Copy this shirt link:", shareUrl);
        }
      });

      syncVisibility();
      window.addEventListener("hashchange", syncVisibility);
    })();

    (function keepShopAtTopOnLoad() {
      function scrollTop() {
        window.scrollTo({ top: 0, left: 0, behavior: "auto" });
      }

      // Run immediately and again after render passes where the embed can steal focus.
      scrollTop();
      requestAnimationFrame(scrollTop);
      setTimeout(scrollTop, 120);
      setTimeout(scrollTop, 400);

      window.addEventListener("hashchange", function () {
        requestAnimationFrame(scrollTop);
      });

      window.addEventListener("pageshow", function () {
        requestAnimationFrame(scrollTop);
      });
    })();

    (function alignCartWithListTitle() {
      var root = document.getElementById("sprd-shop");
      if (!root) return;

      function sync() {
        var titleRow = root.querySelector(".sprd-listpage__header");
        var cartActions = root.querySelector(".sprd-header__actions");
        if (!titleRow || !cartActions) return;
        if (cartActions.parentElement !== titleRow) {
          titleRow.appendChild(cartActions);
        }
      }

      sync();
      var observer = new MutationObserver(sync);
      observer.observe(root, { childList: true, subtree: true });
    })();
  </script>
</body>
</html>
