<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Tagline Editor | Third String Shirts</title>
  <meta name="description" content="Edit shirt taglines for Third String Shirts.">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Alfa+Slab+One&family=Bungee&family=Graduate&family=Space+Grotesk:wght@400;500;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="./css/site.css">
  <link rel="stylesheet" href="./css/tagline-editor.css">
</head>
<body data-page="taglines" class="compact-main">
  <header class="site-header">
    <div class="container header-row">
      <a class="brand" href="./index.html" aria-label="Third String Shirts home">
        <img class="brand-mark" src="./assets/logo.png" alt="Third String Shirts logo">
        <span>
          <p class="brand-title">Third String Shirts</p>
          <p class="brand-tagline">Shirts for Third Stringers</p>
        </span>
      </a>
      <nav class="site-nav" aria-label="Primary">
        <a data-page="home" href="./index.html">Home</a>
        <a data-page="shop" href="./all-shirts.html">Shop</a>
        <a data-page="taglines" href="./tagline-editor.html">Taglines</a>
        <a data-page="about" href="./about.html">About</a>
        <a data-page="faq" href="./faq.html">FAQ</a>
        <a data-page="contact" href="./contact.html">Contact</a>
      </nav>
    </div>
  </header>

  <main>
    <div class="container">
      <div class="section-head">
        <div>
          <h2>Tagline Editor</h2>
          <p id="editor-status">Loading shirts...</p>
        </div>
      </div>

      <div class="editor-toolbar">
        <input id="tagline-search" type="search" placeholder="Search by shirt title, ID, or tagline..." aria-label="Search taglines">
        <button id="reset-btn" type="button" class="button alt">Reset Changes</button>
        <button id="download-btn" type="button" class="button">Download taglines.json</button>
      </div>

      <div class="editor-table-wrap" aria-live="polite">
        <table class="editor-table">
          <thead>
            <tr>
              <th scope="col">ID</th>
              <th scope="col">Shirt</th>
              <th scope="col">Tagline</th>
            </tr>
          </thead>
          <tbody id="tagline-rows">
            <tr>
              <td colspan="3">Loading...</td>
            </tr>
          </tbody>
        </table>
      </div>
    </div>
  </main>

  <footer class="site-footer">
    <div class="container footer-row">
      <p><strong>Third String Shirts</strong> | Edit taglines safely before publishing.</p>
      <p>Follow on <a href="https://x.com/3rdstringshirts" target="_blank" rel="noopener noreferrer">X</a></p>
    </div>
  </footer>

  <script src="./js/site.js?v=20260308a"></script>
  <script src="./js/tagline-editor.js?v=20260308a"></script>
</body>
</html>
