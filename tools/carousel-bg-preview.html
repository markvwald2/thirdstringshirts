<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Carousel Background Preview</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="../css/site.css">
  <style>
    .preview-wrap {
      width: min(1160px, 92vw);
      margin: 0 auto;
      padding: 2rem 0 3rem;
    }
    .preview-grid {
      display: grid;
      grid-template-columns: 1fr;
      gap: 1.4rem;
    }
    .preview-card .carousel {
      min-height: 370px;
    }
    .preview-card .carousel-track {
      height: 100%;
    }
    .preview-card .carousel-slide {
      min-height: 370px;
      grid-template-columns: 1fr 1fr;
      padding: 1.1rem;
    }
    .preview-label {
      margin: 0 0 0.45rem;
      font-weight: 800;
      color: #edf4ff;
    }
  </style>
</head>
<body data-page="carousel-tools" class="compact-main">
  <header class="site-header">
    <div class="container header-row">
      <a class="brand" href="../index.html" aria-label="Third String Shirts home">
        <img class="brand-mark" src="../assets/logo.png" alt="Third String Shirts logo">
        <span>
          <p class="brand-title">Third String Shirts</p>
          <p class="brand-tagline">Admin Tools</p>
        </span>
      </a>
      <nav class="site-nav" aria-label="Tools navigation">
        <a href="./carousel-bg-preview.html" aria-current="page">Carousel Preview</a>
        <a href="./shirt-inventory-viewer.html">Inventory Viewer</a>
        <a href="./tagline-editor.html">Tagline Editor</a>
      </nav>
    </div>
  </header>
  <main>
    <section class="preview-wrap">
      <h1 style="color:#edf4ff;">Carousel Background Preview</h1>
      <p style="color:#c8d9ef;">Each tile shows one sports pattern without shirt content.</p>
      <div class="preview-grid">
        <article class="preview-card">
          <p class="preview-label">Basketball</p>
          <div class="carousel">
            <div class="carousel-track">
              <article class="carousel-slide bg-basketball"></article>
            </div>
          </div>
        </article>
        <article class="preview-card">
          <p class="preview-label">Football</p>
          <div class="carousel">
            <div class="carousel-track">
              <article class="carousel-slide bg-football"></article>
            </div>
          </div>
        </article>
        <article class="preview-card">
          <p class="preview-label">Baseball</p>
          <div class="carousel">
            <div class="carousel-track">
              <article class="carousel-slide bg-baseball"></article>
            </div>
          </div>
        </article>
        <article class="preview-card">
          <p class="preview-label">Soccer</p>
          <div class="carousel">
            <div class="carousel-track">
              <article class="carousel-slide bg-soccer"></article>
            </div>
          </div>
        </article>
        <article class="preview-card">
          <p class="preview-label">Hockey</p>
          <div class="carousel">
            <div class="carousel-track">
              <article class="carousel-slide bg-hockey"></article>
            </div>
          </div>
        </article>
      </div>
    </section>
  </main>
</body>
</html>
