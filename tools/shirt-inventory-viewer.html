<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Image URL Grid Viewer</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Alfa+Slab+One&family=Bungee&family=Graduate&family=Space+Grotesk:wght@400;500;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="../css/site.css">
  <style>
    :root {
      --bg: #f7f8fb;
      --surface: #ffffff;
      --text: #152238;
      --muted: #596b86;
      --border: #d7dfea;
    }

    * { box-sizing: border-box; }

    body {
      margin: 0;
      font-family: "Space Grotesk", "Avenir Next", "Segoe UI", sans-serif;
      color: var(--text);
      background: var(--bg);
    }

    .wrap {
      max-width: 1300px;
      margin: 0 auto;
      padding: 24px;
    }

    h1 {
      margin: 0 0 8px;
      font-size: 1.5rem;
    }

    .status {
      margin-bottom: 12px;
      color: var(--muted);
      font-size: 0.95rem;
    }

    .toolbar {
      display: flex;
      flex-wrap: wrap;
      align-items: center;
      gap: 12px;
      margin-bottom: 16px;
      padding: 10px 12px;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 12px;
      box-shadow: 0 8px 20px rgba(7, 31, 57, 0.06);
    }

    .filter {
      display: flex;
      flex-direction: column;
      gap: 4px;
      font-size: 0.9rem;
      min-width: 180px;
    }

    .filter input {
      width: 100%;
      padding: 6px 8px;
      border: 1px solid var(--border);
      border-radius: 8px;
      font: inherit;
      color: var(--text);
      background: #fff;
    }

    .filter select {
      width: 100%;
      padding: 6px 8px;
      border: 1px solid var(--border);
      border-radius: 8px;
      font: inherit;
      color: var(--text);
      background: #fff;
    }

    .toolbar button {
      padding: 8px 12px;
      border-radius: 8px;
      border: 1px solid var(--border);
      background: #fff;
      color: var(--text);
      cursor: pointer;
      font: inherit;
      font-weight: 600;
    }

    .toggle-row {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      font-size: 0.9rem;
      color: var(--text);
      margin-right: 8px;
    }

    .bulk {
      margin-bottom: 16px;
      padding: 10px 12px;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 12px;
      box-shadow: 0 8px 20px rgba(7, 31, 57, 0.06);
      display: flex;
      flex-wrap: wrap;
      align-items: end;
      gap: 12px;
    }

    .grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(220px, 1fr));
      gap: 14px;
    }

    .card {
      position: relative;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 14px;
      overflow: hidden;
      box-shadow: 0 8px 18px rgba(7, 31, 57, 0.06);
    }

    .card.selected {
      border-color: #0d6fb8;
      box-shadow: 0 0 0 2px rgba(13, 111, 184, 0.2);
    }

    .select-wrap {
      position: absolute;
      top: 8px;
      right: 8px;
      z-index: 1;
      background: rgba(255, 255, 255, 0.9);
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 2px 5px;
      font-size: 0.75rem;
      display: inline-flex;
      align-items: center;
      gap: 4px;
    }

    .thumb {
      width: 100%;
      aspect-ratio: 1 / 1;
      object-fit: cover;
      display: block;
      background: #eef2f7;
    }

    .name {
      padding: 10px 12px 6px;
      font-size: 0.9rem;
      line-height: 1.3;
      font-weight: 600;
    }

    .editor {
      display: grid;
      grid-template-columns: 1fr;
      gap: 8px;
      padding: 0 12px 12px;
    }

    .field {
      display: flex;
      flex-direction: column;
      gap: 4px;
      font-size: 0.8rem;
      color: var(--muted);
    }

    .field input {
      width: 100%;
      padding: 6px 8px;
      border: 1px solid var(--border);
      border-radius: 8px;
      font: inherit;
      color: var(--text);
      background: #fff;
    }

    .apply-btn {
      margin-top: 2px;
      width: 100%;
      padding: 7px 10px;
      border-radius: 8px;
      border: 1px solid var(--border);
      background: #fff;
      color: var(--text);
      cursor: pointer;
      font: inherit;
      font-weight: 600;
    }

    .error { color: #b91c1c; font-weight: 600; }
  </style>
</head>
<body data-page="inventory-tools" class="compact-main">
  <header class="site-header">
    <div class="container header-row">
      <a class="brand" href="../index.html" aria-label="Third String Shirts home">
        <img class="brand-mark" src="../assets/logo.png" alt="Third String Shirts logo">
        <span>
          <p class="brand-title">Third String Shirts</p>
          <p class="brand-tagline">Admin Tools</p>
        </span>
      </a>
      <nav class="site-nav" aria-label="Tools navigation">
        <a href="./carousel-bg-preview.html">Carousel Preview</a>
        <a href="./shirt-inventory-viewer.html" aria-current="page">Inventory Viewer</a>
        <a href="./tagline-editor.html">Tagline Editor</a>
      </nav>
    </div>
  </header>
  <main class="wrap">
    <h1>shirt_inventory.json Viewer</h1>
    <div id="status" class="status">Loading...</div>
    <div class="toolbar">
      <label class="filter">
        <span>Include themes</span>
        <select id="include-theme">
          <option value="">Any</option>
        </select>
      </label>
      <label class="filter">
        <span>Exclude themes</span>
        <select id="exclude-theme">
          <option value="">None</option>
        </select>
      </label>
      <label class="filter">
        <span>Include sub-themes</span>
        <select id="include-sub-theme">
          <option value="">Any</option>
        </select>
      </label>
      <label class="filter">
        <span>Exclude sub-themes</span>
        <select id="exclude-sub-theme">
          <option value="">None</option>
        </select>
      </label>
      <label class="filter">
        <span>Include tags</span>
        <input id="include-tags" type="text" placeholder="comma-separated exact tags" />
      </label>
      <label class="filter">
        <span>Exclude tags</span>
        <input id="exclude-tags" type="text" placeholder="comma-separated exact tags" />
      </label>
      <label class="toggle-row">
        <input id="unthemed-only" type="checkbox" />
        <span>Un-themed only</span>
      </label>
      <button id="clear-filters" type="button">Clear Filters</button>
      <button id="export-json" type="button">Export JSON</button>
    </div>
    <div class="bulk">
      <label class="filter">
        <span>Bulk theme</span>
        <input id="bulk-theme" type="text" placeholder="e.g. geography" />
      </label>
      <label class="filter">
        <span>Bulk sub-theme</span>
        <input id="bulk-sub-theme" type="text" placeholder="e.g. State names" />
      </label>
      <label class="filter">
        <span>Bulk tags (comma-separated)</span>
        <input id="bulk-tags" type="text" placeholder="e.g. geography, state-names" />
      </label>
      <button id="apply-selected" type="button">Apply To Selected</button>
      <button id="select-visible" type="button">Select Visible</button>
      <button id="clear-selection" type="button">Clear Selection</button>
    </div>
    <section id="grid" class="grid"></section>
  </main>

  <script>
    const statusEl = document.getElementById('status');
    const gridEl = document.getElementById('grid');
    const includeThemeEl = document.getElementById('include-theme');
    const excludeThemeEl = document.getElementById('exclude-theme');
    const includeSubThemeEl = document.getElementById('include-sub-theme');
    const excludeSubThemeEl = document.getElementById('exclude-sub-theme');
    const includeTagsEl = document.getElementById('include-tags');
    const excludeTagsEl = document.getElementById('exclude-tags');
    const unthemedOnlyEl = document.getElementById('unthemed-only');
    const clearFiltersEl = document.getElementById('clear-filters');
    const exportJsonEl = document.getElementById('export-json');
    const bulkThemeEl = document.getElementById('bulk-theme');
    const bulkSubThemeEl = document.getElementById('bulk-sub-theme');
    const bulkTagsEl = document.getElementById('bulk-tags');
    const applySelectedEl = document.getElementById('apply-selected');
    const selectVisibleEl = document.getElementById('select-visible');
    const clearSelectionEl = document.getElementById('clear-selection');
    const entries = [];
    const dataset = [];

    function makeCard(item) {
      const card = document.createElement('article');
      card.className = 'card';

      const selectWrap = document.createElement('label');
      selectWrap.className = 'select-wrap';
      const selectInput = document.createElement('input');
      selectInput.type = 'checkbox';
      selectWrap.appendChild(selectInput);
      selectWrap.appendChild(document.createTextNode('Select'));

      const img = document.createElement('img');
      img.className = 'thumb';
      img.loading = 'lazy';
      img.src = item.image_url || item.URL;
      img.alt = item.shirt_name || item.name || 'image';

      const name = document.createElement('div');
      name.className = 'name';
      name.textContent = item.shirt_name || item.name || '(unnamed)';

      const editor = document.createElement('div');
      editor.className = 'editor';

      const shirtNameField = document.createElement('label');
      shirtNameField.className = 'field';
      shirtNameField.innerHTML = '<span>Shirt name</span>';
      const shirtNameInput = document.createElement('input');
      shirtNameInput.type = 'text';
      shirtNameInput.value = item.shirt_name || item.name || '';
      shirtNameField.appendChild(shirtNameInput);

      const themeField = document.createElement('label');
      themeField.className = 'field';
      themeField.innerHTML = '<span>Theme</span>';
      const themeInput = document.createElement('input');
      themeInput.type = 'text';
      themeInput.value = item.theme || '';
      themeField.appendChild(themeInput);

      const subThemeField = document.createElement('label');
      subThemeField.className = 'field';
      subThemeField.innerHTML = '<span>Sub-theme</span>';
      const subThemeInput = document.createElement('input');
      subThemeInput.type = 'text';
      subThemeInput.value = item.sub_theme || '';
      subThemeField.appendChild(subThemeInput);

      const tagsField = document.createElement('label');
      tagsField.className = 'field';
      tagsField.innerHTML = '<span>Tags (comma-separated)</span>';
      const tagsInput = document.createElement('input');
      tagsInput.type = 'text';
      tagsInput.value = Array.isArray(item.tags) ? item.tags.join(', ') : '';
      tagsField.appendChild(tagsInput);

      const productUrlField = document.createElement('label');
      productUrlField.className = 'field';
      productUrlField.innerHTML = '<span>Product URL</span>';
      const productUrlInput = document.createElement('input');
      productUrlInput.type = 'text';
      productUrlInput.value = item.product_url || '';
      productUrlField.appendChild(productUrlInput);

      const applyButton = document.createElement('button');
      applyButton.type = 'button';
      applyButton.className = 'apply-btn';
      applyButton.textContent = 'Apply';

      editor.appendChild(shirtNameField);
      editor.appendChild(themeField);
      editor.appendChild(subThemeField);
      editor.appendChild(tagsField);
      editor.appendChild(productUrlField);
      editor.appendChild(applyButton);

      card.appendChild(selectWrap);
      card.appendChild(img);
      card.appendChild(name);
      card.appendChild(editor);
      return { card, name, img, shirtNameInput, themeInput, subThemeInput, tagsInput, productUrlInput, applyButton, selectInput };
    }

    function updateCardSelectionVisual(entry) {
      entry.card.classList.toggle('selected', entry.selectInput.checked);
    }

    function parseFilterSet(value) {
      return new Set(
        String(value || '')
          .split(',')
          .map((v) => v.trim().toLowerCase())
          .filter(Boolean)
      );
    }

    function lowerValue(value) {
      return String(value || '').trim().toLowerCase();
    }

    function fillSelect(selectEl, values, emptyLabel) {
      const current = selectEl.value;
      selectEl.innerHTML = '';
      const emptyOpt = document.createElement('option');
      emptyOpt.value = '';
      emptyOpt.textContent = emptyLabel;
      selectEl.appendChild(emptyOpt);
      values.forEach((value) => {
        const opt = document.createElement('option');
        opt.value = value;
        opt.textContent = value;
        selectEl.appendChild(opt);
      });
      selectEl.value = values.includes(current) ? current : '';
    }

    function applyFilters() {
      const includeTheme = lowerValue(includeThemeEl.value);
      const excludeTheme = lowerValue(excludeThemeEl.value);
      const includeSubTheme = lowerValue(includeSubThemeEl.value);
      const excludeSubTheme = lowerValue(excludeSubThemeEl.value);
      const includeTags = parseFilterSet(includeTagsEl.value);
      const excludeTags = parseFilterSet(excludeTagsEl.value);
      const unthemedOnly = unthemedOnlyEl.checked;
      let visibleCount = 0;
      let selectedCount = 0;

      entries.forEach((entry) => {
        const themeVal = String(entry.item.theme || '').toLowerCase();
        const subThemeVal = String(entry.item.sub_theme || '').toLowerCase();
        const tagsVal = Array.isArray(entry.item.tags) ? entry.item.tags.map((t) => String(t).toLowerCase()) : [];
        const matchIncludeTheme = !includeTheme || includeTheme === themeVal;
        const matchExcludeTheme = !excludeTheme || excludeTheme !== themeVal;
        const matchIncludeSubTheme = !includeSubTheme || includeSubTheme === subThemeVal;
        const matchExcludeSubTheme = !excludeSubTheme || excludeSubTheme !== subThemeVal;
        const matchIncludeTag = includeTags.size === 0 || tagsVal.some((t) => includeTags.has(t));
        const matchExcludeTag = !tagsVal.some((t) => excludeTags.has(t));
        const matchUnthemed = !unthemedOnly || !entry.item.theme || !entry.item.theme.trim();
        const show = matchIncludeTheme && matchExcludeTheme && matchIncludeSubTheme && matchExcludeSubTheme && matchIncludeTag && matchExcludeTag && matchUnthemed;
        entry.card.style.display = show ? '' : 'none';
        if (!show && entry.selectInput.checked) {
          entry.selectInput.checked = false;
          updateCardSelectionVisual(entry);
        }
        if (show) visibleCount += 1;
        if (entry.selectInput.checked) selectedCount += 1;
      });

      statusEl.textContent = `Loaded ${dataset.length} images. Showing ${visibleCount}. Selected ${selectedCount}.`;
    }

    function parseTags(value) {
      return value
        .split(',')
        .map((t) => t.trim())
        .filter(Boolean);
    }

    function exportJson() {
      const out = JSON.stringify(dataset, null, 2) + '\n';
      const blob = new Blob([out], { type: 'application/json' });
      const url = URL.createObjectURL(blob);
      const a = document.createElement('a');
      a.href = url;
      a.download = 'shirt_inventory.json';
      document.body.appendChild(a);
      a.click();
      a.remove();
      URL.revokeObjectURL(url);
    }

    function applyBulkToSelected() {
      const themeVal = bulkThemeEl.value.trim();
      const subThemeVal = bulkSubThemeEl.value.trim();
      const bulkTags = parseTags(bulkTagsEl.value);
      entries.forEach((entry) => {
        if (!entry.selectInput.checked || entry.card.style.display === 'none') return;
        if (themeVal) {
          entry.item.theme = themeVal;
          entry.themeInput.value = themeVal;
        }
        if (subThemeVal) {
          entry.item.sub_theme = subThemeVal;
          entry.subThemeInput.value = subThemeVal;
        }
        if (bulkTags.length) {
          const merged = new Set([...(Array.isArray(entry.item.tags) ? entry.item.tags : []), ...bulkTags]);
          entry.item.tags = Array.from(merged);
          entry.tagsInput.value = entry.item.tags.join(', ');
        }
        entry.selectInput.checked = false;
        updateCardSelectionVisual(entry);
      });
      applyFilters();
    }

    async function pickInventoryFile() {
      return new Promise((resolve, reject) => {
        const input = document.createElement('input');
        input.type = 'file';
        input.accept = '.json,application/json';
        input.style.display = 'none';
        document.body.appendChild(input);

        input.addEventListener('change', async () => {
          try {
            const file = input.files && input.files[0];
            if (!file) {
              reject(new Error('No file selected'));
              return;
            }
            const text = await file.text();
            const data = JSON.parse(text);
            if (!Array.isArray(data)) throw new Error('Expected JSON array');
            resolve({ data, sourcePath: `file picker (${file.name})` });
          } catch (error) {
            reject(error);
          } finally {
            input.remove();
          }
        }, { once: true });

        input.click();
      });
    }

    async function loadInventory() {
      const candidatePaths = [
        '../data/shirt_inventory.json',
        './shirt_inventory.json'
      ];

      let lastError = null;
      for (const path of candidatePaths) {
        try {
          const res = await fetch(path, { cache: 'no-store' });
          if (!res.ok) throw new Error(`HTTP ${res.status}`);
          const data = await res.json();
          if (!Array.isArray(data)) throw new Error('Expected JSON array');
          return { data, sourcePath: path };
        } catch (error) {
          lastError = error;
        }
      }

      if (window.location.protocol === 'file:') {
        statusEl.textContent = 'Select data/shirt_inventory.json to continue.';
        return pickInventoryFile();
      }

      throw lastError || new Error('Unable to load inventory JSON');
    }

    async function init() {
      try {
        const { data, sourcePath } = await loadInventory();

        const sorted = [...data].sort((a, b) =>
          String(a.shirt_name || a.name || '').localeCompare(String(b.shirt_name || b.name || ''))
        );
        sorted.forEach((item) => {
          item.shirt_name = String(item.shirt_name || item.name || '');
          item.image_url = String(item.image_url || item.URL || '');
          if (!item || !item.image_url) return;
          if (typeof item.theme !== 'string') item.theme = '';
          if (typeof item.sub_theme !== 'string') item.sub_theme = '';
          if (!Array.isArray(item.tags)) item.tags = [];
          if (typeof item.product_url !== 'string') item.product_url = '';
          if (typeof item.tone !== 'string') item.tone = '';
          if (typeof item.priority !== 'string') item.priority = '';
          if (typeof item.evergreen !== 'boolean') item.evergreen = null;
          item.name = item.shirt_name;
          item.URL = item.image_url;

          dataset.push(item);
          const { card, name, img, shirtNameInput, themeInput, subThemeInput, tagsInput, productUrlInput, applyButton, selectInput } = makeCard(item);
          gridEl.appendChild(card);
          selectInput.addEventListener('change', () => {
            updateCardSelectionVisual({ card, selectInput });
            applyFilters();
          });
          applyButton.addEventListener('click', () => {
            item.shirt_name = shirtNameInput.value.trim();
            item.name = item.shirt_name;
            name.textContent = item.shirt_name || '(unnamed)';
            img.alt = item.shirt_name || 'image';
            item.theme = themeInput.value.trim();
            item.sub_theme = subThemeInput.value.trim();
            item.tags = parseTags(tagsInput.value);
            tagsInput.value = item.tags.join(', ');
            item.product_url = productUrlInput.value.trim();
            applyFilters();
          });

          const entry = { card, item, name, img, shirtNameInput, themeInput, subThemeInput, tagsInput, productUrlInput, applyButton, selectInput };
          entries.push(entry);
          updateCardSelectionVisual(entry);
        });

        const themes = Array.from(
          new Set(dataset.map((item) => String(item.theme || '').trim()).filter(Boolean))
        ).sort((a, b) => a.localeCompare(b));
        const subThemes = Array.from(
          new Set(dataset.map((item) => String(item.sub_theme || '').trim()).filter(Boolean))
        ).sort((a, b) => a.localeCompare(b));
        fillSelect(includeThemeEl, themes, 'Any');
        fillSelect(excludeThemeEl, themes, 'None');
        fillSelect(includeSubThemeEl, subThemes, 'Any');
        fillSelect(excludeSubThemeEl, subThemes, 'None');

        includeThemeEl.addEventListener('change', applyFilters);
        excludeThemeEl.addEventListener('change', applyFilters);
        includeSubThemeEl.addEventListener('change', applyFilters);
        excludeSubThemeEl.addEventListener('change', applyFilters);
        includeTagsEl.addEventListener('input', applyFilters);
        excludeTagsEl.addEventListener('input', applyFilters);
        unthemedOnlyEl.addEventListener('change', applyFilters);
        clearFiltersEl.addEventListener('click', () => {
          includeThemeEl.value = '';
          excludeThemeEl.value = '';
          includeSubThemeEl.value = '';
          excludeSubThemeEl.value = '';
          includeTagsEl.value = '';
          excludeTagsEl.value = '';
          unthemedOnlyEl.checked = false;
          applyFilters();
        });
        exportJsonEl.addEventListener('click', exportJson);
        applySelectedEl.addEventListener('click', applyBulkToSelected);
        selectVisibleEl.addEventListener('click', () => {
          entries.forEach((entry) => {
            if (entry.card.style.display !== 'none') {
              entry.selectInput.checked = true;
              updateCardSelectionVisual(entry);
            }
          });
          applyFilters();
        });
        clearSelectionEl.addEventListener('click', () => {
          entries.forEach((entry) => {
            entry.selectInput.checked = false;
            updateCardSelectionVisual(entry);
          });
          applyFilters();
        });

        applyFilters();
        statusEl.textContent = `${statusEl.textContent} Source: ${sourcePath}`;
      } catch (err) {
        statusEl.innerHTML = `<span class="error">Failed to load JSON: ${err.message}</span>`;
      }
    }

    init();
  </script>
</body>
</html>
